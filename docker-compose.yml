services:
  postgres:
    image: postgres:16-alpine
    container_name: clockhub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: clockhub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - clockhub-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d clockhub"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  clockhub-postgres-data:
